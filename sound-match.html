<!DOCTYPE html>
<!--
  Sound Match — a free, open-source memory & sound game for kids
  Watch and listen to the pattern, then repeat it back by tapping the pads.
  License: MIT — do whatever you like with this, just keep the notice.
  Copyright (c) 2026
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;700;800&display=swap');

  :root{
    --bg1:#FFE8D6;
    --bg2:#D6EFFF;
    --ink:#3B2A4A;
    --ink-soft:#6B5A7A;
    --card:#FFFFFF;
    --cream:#FFFBF2;
    --red:#F2836B;      --red-deep:#D9603F;
    --blue:#6FB6E0;      --blue-deep:#3E85AD;
    --yellow:#F4C744;    --yellow-deep:#D9A61E;
    --green:#7CB268;     --green-deep:#5C9048;
    --purple:#8A6FD6;    --purple-deep:#5F49A8;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    font-family:'Nunito', sans-serif;
    background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    min-height:100vh;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:24px 16px 60px;
  }

  .wrap{ width:100%; max-width:480px; }

  h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:clamp(28px, 6vw, 38px);
    text-align:center;
    margin:6px 0 2px;
    color:var(--purple-deep);
  }

  .subtitle{
    text-align:center;
    font-size:14px;
    color:var(--ink-soft);
    margin:0 0 20px;
    font-weight:700;
  }

  .card{
    background:var(--card);
    border-radius:26px;
    padding:24px 20px 26px;
    box-shadow: 0 10px 0 rgba(59,42,74,0.08), 0 4px 20px rgba(59,42,74,0.14);
  }

  .stat-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--ink-soft);
  }
  .stat-pill{
    background: var(--cream);
    padding:6px 14px;
    border-radius:999px;
  }

  .status-text{
    text-align:center;
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:19px;
    min-height:28px;
    margin-bottom:18px;
    color: var(--purple-deep);
  }
  .status-text.lose{ color: var(--red-deep); }

  .pad-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:14px;
    margin-bottom:20px;
  }

  .pad{
    aspect-ratio: 1 / 1;
    border-radius:24px;
    border:none;
    font-size:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition: transform 0.08s ease, filter 0.15s ease, box-shadow 0.15s ease;
  }
  .pad:active{ transform: scale(0.94); }
  .pad:disabled{ cursor:default; }

  .pad-red{ background: var(--red); box-shadow: 0 6px 0 var(--red-deep); }
  .pad-blue{ background: var(--blue); box-shadow: 0 6px 0 var(--blue-deep); }
  .pad-yellow{ background: var(--yellow); box-shadow: 0 6px 0 var(--yellow-deep); }
  .pad-green{ background: var(--green); box-shadow: 0 6px 0 var(--green-deep); }

  .pad.lit{
    filter: brightness(1.35);
    transform: scale(1.04);
  }

  .bottom-row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .primary-btn{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:15px;
    padding:12px 26px;
    border-radius:999px;
    border:none;
    background: var(--purple);
    color:white;
    cursor:pointer;
    box-shadow: 0 4px 0 var(--purple-deep);
  }
  .primary-btn:active{ transform: translateY(3px); box-shadow:none; }
  .primary-btn:disabled{ opacity:0.5; cursor:default; }

  .ghost-btn{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:14px;
    padding:11px 20px;
    border-radius:999px;
    border: 2px solid #EFE6D8;
    background: transparent;
    color: var(--ink-soft);
    cursor:pointer;
  }
  .ghost-btn:disabled{ opacity:0.4; cursor:default; }

  .footer-note{
    text-align:center;
    font-size:12px;
    color:rgba(59,42,74,0.55);
    margin-top:18px;
    line-height:1.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔊 Sound Match</h1>
  <p class="subtitle">Watch and listen, then repeat the pattern!</p>

  <div class="card">
    <div class="stat-row">
      <span class="stat-pill">Round: <span id="roundNum">0</span></span>
      <span class="stat-pill">Best: <span id="bestNum">0</span></span>
    </div>

    <div class="status-text" id="statusText">Tap Start to play!</div>

    <div class="pad-grid">
      <button class="pad pad-red" id="pad0" data-note="0" disabled>🐱</button>
      <button class="pad pad-blue" id="pad1" data-note="1" disabled>🐶</button>
      <button class="pad pad-yellow" id="pad2" data-note="2" disabled>🐤</button>
      <button class="pad pad-green" id="pad3" data-note="3" disabled>🐸</button>
    </div>

    <div class="bottom-row">
      <button class="primary-btn" id="startBtn">Start</button>
      <button class="ghost-btn" id="replayBtn" disabled>🔁 Hear it again</button>
    </div>
  </div>

  <p class="footer-note">
    Free and open source — MIT licensed. Sounds are generated in your browser — no audio files needed.<br>
    Feel free to copy, remix, and host this anywhere.
  </p>
</div>

<script>
  const pads = [
    document.getElementById('pad0'),
    document.getElementById('pad1'),
    document.getElementById('pad2'),
    document.getElementById('pad3')
  ];
  const startBtn = document.getElementById('startBtn');
  const replayBtn = document.getElementById('replayBtn');
  const statusText = document.getElementById('statusText');
  const roundNum = document.getElementById('roundNum');
  const bestNum = document.getElementById('bestNum');

  const NOTE_FREQS = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5

  let audioCtx = null;
  let sequence = [];
  let playerStep = 0;
  let best = 0;
  let acceptingInput = false;

  function getAudioCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playNote(index, duration = 0.35){
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = NOTE_FREQS[index];
    gain.gain.setValueAtTime(0.001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.05);
  }

  function litPad(index, ms){
    return new Promise(resolve => {
      pads[index].classList.add('lit');
      playNote(index);
      setTimeout(() => {
        pads[index].classList.remove('lit');
        resolve();
      }, ms);
    });
  }

  function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function setPadsEnabled(enabled){
    pads.forEach(p => p.disabled = !enabled);
  }

  async function playSequence(){
    acceptingInput = false;
    setPadsEnabled(false);
    replayBtn.disabled = true;
    statusText.textContent = 'Watch and listen…';
    statusText.classList.remove('lose');
    await wait(500);
    for(const note of sequence){
      await litPad(note, 500);
      await wait(200);
    }
    playerStep = 0;
    acceptingInput = true;
    setPadsEnabled(true);
    replayBtn.disabled = false;
    statusText.textContent = 'Your turn!';
  }

  function nextRound(){
    sequence.push(Math.floor(Math.random() * 4));
    roundNum.textContent = sequence.length;
    playSequence();
  }

  function handlePadPress(index){
    if(!acceptingInput) return;
    litPad(index, 250);

    if(sequence[playerStep] !== index){
      loseGame();
      return;
    }

    playerStep += 1;
    if(playerStep === sequence.length){
      acceptingInput = false;
      setPadsEnabled(false);
      statusText.textContent = 'Nice one! Next round…';
      if(sequence.length > best){
        best = sequence.length;
        bestNum.textContent = best;
      }
      setTimeout(nextRound, 900);
    }
  }

  function loseGame(){
    acceptingInput = false;
    setPadsEnabled(false);
    replayBtn.disabled = true;
    statusText.textContent = 'Oops! The pattern was ' + sequence.length + ' long. Try again!';
    statusText.classList.add('lose');
    startBtn.disabled = false;
    startBtn.textContent = 'Play again';
  }

  function startGame(){
    getAudioCtx();
    sequence = [];
    playerStep = 0;
    best = Math.max(best, 0);
    roundNum.textContent = 0;
    startBtn.disabled = true;
    startBtn.textContent = 'Playing…';
    nextRound();
  }

  pads.forEach((pad, i) => {
    pad.addEventListener('click', () => handlePadPress(i));
  });

  startBtn.addEventListener('click', startGame);
  replayBtn.addEventListener('click', playSequence);
</script>
</body>
</html>
